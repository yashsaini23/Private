<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sorry to Miss Poonam Dwivedi</title>

<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>
<link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Hello Mam</h1>
        </div>

        <div class="greeting-card">
            <h2 class="main-greeting">
                Hello <span class="name-highlight">Miss Poonam dwivedi</span>
            </h2>

            <div class="decoration">
                <i class="fas fa-smile"></i>
                <i class="fas fa-smile"></i>
                <i class="fas fa-smile"></i>
            </div>

            <p class="apology-text">Please accept my apology 🙏</p>

            <div class="response-buttons">
                <button class="accept-btn" onclick="handleYes()">Maaf Kiya</button>
                <button class="reject-btn" onmouseover="moveButton(this)">Niooo</button>
            </div>

            <p id="pleaseText" class="please-text"></p>
        </div> <!-- greeting-card -->

    </div> <!-- container -->

    <script src="script.js"></script>
</body>
</html>
